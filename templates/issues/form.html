{% extends 'base.html' %}
{% block title %}{{ 'Edit Issue' if mode == 'edit' else 'New Issue' }}{% endblock %}

{% block content %}
<div class="page-header">
  <a href="{{ url_for('dashboard') }}" class="btn btn-ghost btn-sm">&larr; Back to Dashboard</a>
</div>

<div class="form-card">
  <h1>{{ 'Edit Issue' if mode == 'edit' else 'Log New Issue' }}</h1>

  <form method="POST" action="{{ form_action }}" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="field">
      <label for="title">Title <span class="required">*</span></label>
      <input type="text" id="title" name="title"
             value="{{ values.title or '' }}" maxlength="200" required>
    </div>

    <div class="field">
      <label for="description">Description <span class="required">*</span></label>
      <textarea id="description" name="description" required>{{ values.description or '' }}</textarea>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="severity">Severity <span class="required">*</span></label>
        <select id="severity" name="severity" required>
          {% for s in valid_severities %}
            <option value="{{ s }}" {% if values.severity == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label for="status">Status <span class="required">*</span></label>
        <select id="status" name="status" required>
          {% for s in valid_statuses %}
            <option value="{{ s }}" {% if values.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ 'Save Changes' if mode == 'edit' else 'Create Issue' }}
      </button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
